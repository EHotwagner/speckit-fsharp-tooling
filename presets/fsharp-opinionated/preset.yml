schema_version: "1.0"

preset:
  id: fsharp-opinionated
  name: "F# Opinionated"
  version: "1.0.0"
  description: "Opinionated pure-F# constitution, FSI-first workflow, and synthetic-evidence discipline. Pairs with the evidence extension for DAG-aware task tracking and merge-readiness audits."
  author: EHotwagner
  license: MIT

requires:
  speckit_version: ">=0.7.0"

provides:
  templates:
    - name: constitution-template.md
      file: templates/constitution-template.md
      description: "Six-principle F# constitution with LOCKED/TAILORABLE section markers"
    - name: tasks-template.md
      file: templates/tasks-template.md
      description: "Tasks checklist with [S] synthetic-evidence status marker"
    - name: tasks.deps-template.yml
      file: templates/tasks.deps-template.yml
      description: "Sibling YAML seed for task-graph topology"

  commands:
    - name: speckit.constitution
      file: commands/speckit-constitution.md
      description: "Fill constitution placeholders while respecting LOCKED markers"
    - name: speckit.tasks
      file: commands/speckit-tasks.md
      description: "Emit tasks.md and tasks.deps.yml in lockstep"
    - name: speckit.implement
      file: commands/speckit-implement.md
      description: "Implement with [S] synthetic marking discipline"

tags:
  - fsharp
  - opinionated
  - fsi-first
  - synthetic-evidence
